name: "gmc — Google Merchant Center CLI"
description: "Run gmc in CI — preflight gates feed files offline with inline annotations, job summaries, and structured outputs."
author: "Yasser Studio"
branding:
  icon: "shopping-cart"
  color: "blue"

inputs:
  command:
    description: "The gmc command to run (e.g. preflight, 'reports check', 'feeds diff'). Default: preflight."
    required: false
    default: "preflight"
  args:
    description: "Extra arguments for the command, e.g. '--dir feeds --strict'."
    required: false
    default: ""
  account:
    description: "Merchant Center account id (sets GMC_ACCOUNT_ID). Needed for authenticated commands."
    required: false
    default: ""
  credentials:
    description: "A Google service-account key JSON, for authenticated commands. Pass a repository secret — never inline."
    required: false
    default: ""
  version:
    description: "The @gmc-cli/cli version to run (npm dist-tag or version). Default: latest."
    required: false
    default: "latest"
  working-directory:
    description: "Directory to run gmc in (where your feeds / .gmcpreflightrc live)."
    required: false
    default: "."

outputs:
  ok:
    description: "Whether preflight passed (true/false). Only set when command is preflight."
    value: ${{ steps.run.outputs.ok }}
  scanned:
    description: "Number of products scanned. Only set when command is preflight."
    value: ${{ steps.run.outputs.scanned }}
  errors:
    description: "Number of errors found. Only set when command is preflight."
    value: ${{ steps.run.outputs.errors }}
  warnings:
    description: "Number of warnings found. Only set when command is preflight."
    value: ${{ steps.run.outputs.warnings }}
  report:
    description: "Full preflight report as JSON. Only set when command is preflight."
    value: ${{ steps.run.outputs.report }}

runs:
  using: "composite"
  steps:
    - name: Configure credentials
      if: ${{ inputs.credentials != '' }}
      shell: bash
      env:
        GMC_CREDENTIALS: ${{ inputs.credentials }}
      run: |
        key_file="$RUNNER_TEMP/gmc-credentials.json"
        printf '%s' "$GMC_CREDENTIALS" > "$key_file"
        chmod 600 "$key_file"
        echo "GOOGLE_APPLICATION_CREDENTIALS=$key_file" >> "$GITHUB_ENV"

    - name: Install gmc
      shell: bash
      env:
        GMC_VERSION: ${{ inputs.version }}
      run: npm install --global "@gmc-cli/cli@$GMC_VERSION"

    # Preflight gets the enhanced flow: JSON parsing, inline annotations on
    # PR diffs, a job-summary table, and structured outputs.  All other
    # commands pass through directly.
    - name: Run gmc
      id: run
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        GMC_VERSION: ${{ inputs.version }}
        GMC_COMMAND: ${{ inputs.command }}
        GMC_ARGS: ${{ inputs.args }}
        GMC_ACCOUNT_ID: ${{ inputs.account }}
      run: |
        if [ "$GMC_COMMAND" = "preflight" ]; then
          node "${{ github.action_path }}/action/run.mjs"
        else
          set -f
          read -ra cmd <<< "$GMC_COMMAND"
          read -ra extra <<< "$GMC_ARGS"
          gmc "${cmd[@]}" "${extra[@]}"
        fi
