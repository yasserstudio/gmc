name: Release binaries

# Runs when a GitHub Release is published (at launch), not on every tag push — so
# routine tags don't trigger it. Builds self-contained binaries (no Node required)
# for macOS/Linux, attaches them + a checksums.txt to the release, then tells the
# Homebrew tap to bump its formula from those checksums.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      # Build the whole workspace, not just the cli: the cli bundles the @gmc-cli/*
      # packages (tsup noExternal), so esbuild needs their dist/ to exist first.
      - run: pnpm build
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Build standalone binaries
        run: |
          set -euo pipefail
          mkdir -p out
          entry="packages/cli/dist/bin.js"
          for target in bun-darwin-arm64 bun-darwin-x64 bun-linux-x64 bun-linux-arm64; do
            bun build "$entry" --compile --target="$target" --outfile "out/gmc-${target#bun-}"
          done
          ls -la out

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd out
          sha256sum gmc-* > checksums.txt
          cat checksums.txt

      - name: Attach to the release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          # Pass the tag through the environment rather than interpolating it into
          # the shell — a crafted tag name can't then inject commands.
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$RELEASE_TAG" out/gmc-* out/checksums.txt --clobber

      - name: Bump the Homebrew tap formula
        if: github.event_name == 'release'
        continue-on-error: true # tolerate a missing HOMEBREW_TAP_TOKEN
        env:
          # A PAT with contents:write on yasserstudio/homebrew-tap — GITHUB_TOKEN
          # can't dispatch cross-repo. Falls back to github.token (no-op) if unset.
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN || github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "::error::Invalid tag format: $TAG"
            exit 1
          fi
          gh api repos/yasserstudio/homebrew-tap/dispatches \
            -f event_type=gmc-release-published \
            -f "client_payload[version]=$TAG"
