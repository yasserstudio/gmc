name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions: {}

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    # Non-blocking until the repo's Dependency Graph is enabled (Settings →
    # Code security → Dependency graph). Once enabled, this becomes a hard gate
    # on high-severity vulns + GPL licenses; until then it self-skips cleanly.
    # Vuln scanning is already gated by `pnpm audit --prod` (below) + the Socket app.
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0

  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]
    name: check (node ${{ matrix.node-version }})
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile --ignore-scripts

      # Single-run gates on the primary Node; test + build run on every matrix version.
      - name: Audit production dependencies
        if: matrix.node-version == 22
        run: pnpm audit --prod --audit-level=high

      - name: Lint
        if: matrix.node-version == 22
        run: pnpm lint

      - name: Typecheck
        if: matrix.node-version == 22
        run: pnpm typecheck

      - name: Format check
        if: matrix.node-version == 22
        run: pnpm format:check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
